<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FCAB — Online omgeving</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#faf9f7;
  --border:#e8e4de;
  --text:#1c1a17;
  --text2:#5a5650;
  --accent:#e07a2f;
  --sans:"Poppins",system-ui,sans-serif;
}
html,body{
  min-height:100vh;
  font-family:var(--sans);
  background:var(--cream);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
}
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:56px 60px;
  max-width:520px;width:100%;
  text-align:center;
  box-shadow:0 4px 32px rgba(0,0,0,.06);
}
.logo-wrap{margin-bottom:32px;}
.logo-wrap img{height:60px;width:auto;}
.status-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(224,122,47,.1);
  border:1px solid rgba(224,122,47,.3);
  color:var(--accent);
  font-size:11px;font-weight:600;letter-spacing:.5px;
  padding:5px 13px;border-radius:20px;
  margin-bottom:24px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
h1{
  font-size:22px;font-weight:600;
  color:var(--text);letter-spacing:-.02em;
  line-height:1.35;margin-bottom:12px;
}
.desc{
  font-size:13.5px;font-weight:300;
  color:var(--text2);line-height:1.75;
}
@media(max-width:480px){
  .card{padding:36px 28px;}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap"><img id="logo-img" alt="FCAB"></div>
  <h1>We bouwen aan de<br>FCAB-website</h1>
  <p class="desc">De online omgeving voor FCAB is momenteel in ontwikkeling. Hier wordt de methodiek beschikbaar gesteld.</p>
</div>
